name: CI (Manual Trigger)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the job on'
        required: true
        default: 'master'

jobs:
  artifacts:
    runs-on: ubuntu-latest
    steps:
      # Checkout the selected branch from the manual input
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.inputs.branch }}  # Use the branch provided by the manual trigger

      - uses: docker://node:20-alpine
        name: Setup Node

      - name: Install dependencies
        working-directory: _tools/build-tool
        run: npm install

      - name: Assemble and pack
        working-directory: _tools/build-tool
        run: npx gulp

      - uses: actions/upload-artifact@v2
        with:
          name: PBO-Files
          path: build/pbo
